<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zikir-Matik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── TEMA ── */
[data-theme="dark"]{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;
  --accent:#c9a96e;--accent2:#e8c99a;--text:#e8e4d9;--muted:#7a7590;
  --green:#4caf7d;--red:#e05252;--card-shadow:none;
  --btn-bg:#1c1c27;--theme-icon:"☀️";
}
[data-theme="light"]{
  --bg:#f5f0e8;--surface:#ffffff;--surface2:#f0ebe0;--border:#d4c9b0;
  --accent:#8b5e2a;--accent2:#6b4520;--text:#2c2416;--muted:#7a6a52;
  --green:#2e7d52;--red:#c0392b;--card-shadow:0 1px 4px rgba(0,0,0,.08);
  --btn-bg:#efe8d8;--theme-icon:"🌙";
}

body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}

/* ── HEADER ── */
#menuView{padding:1.2rem 1rem 5rem}
.app-header{text-align:center;padding:1.8rem 0 1.2rem;position:relative}
.app-header h1{font-size:1.8rem;color:var(--accent2);letter-spacing:.12em;font-weight:400}
.app-header p{font-size:.78rem;color:var(--muted);margin-top:.3rem;letter-spacing:.06em}
.header-divider{width:40px;height:1px;background:var(--accent);margin:.7rem auto 0;opacity:.5}
.header-actions{position:absolute;top:1.8rem;right:0;display:flex;gap:.5rem}
.icon-btn{background:none;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── DATE STRIP ── */
.date-strip{text-align:center;font-size:.72rem;color:var(--muted);margin-bottom:1rem;letter-spacing:.04em}

.section-label{font-size:.68rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin:1.2rem 0 .5rem;padding:0 .25rem}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden;box-shadow:var(--card-shadow)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity .2s;border-radius:14px 0 0 14px}
.card:hover{background:var(--surface2);border-color:var(--accent)}
.card:hover::before{opacity:1}
.card .title{font-size:1rem;color:var(--text);margin-bottom:.3rem}
.card .meta{font-size:.75rem;color:var(--muted)}
.card .meta b{color:var(--accent)}
.card .descPreview{font-size:.73rem;color:var(--muted);margin-top:.35rem;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.7}
.card .progress-mini{height:2px;background:var(--border);border-radius:2px;margin-top:.6rem;overflow:hidden}
.card .progress-mini-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.completed-badge{background:rgba(76,175,125,.12);border:1px solid rgba(76,175,125,.3);color:var(--green);border-radius:20px;padding:.15rem .7rem;font-size:.66rem;margin-left:.5rem;vertical-align:middle}

/* ── COUNTER VIEW ── */
#counterView{display:flex;flex-direction:column;min-height:100vh;padding-bottom:2rem}
.counter-header{padding:.9rem 1rem .5rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border)}
#backBtn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s;font-family:inherit}
#backBtn:hover{color:var(--text);border-color:var(--accent)}
.counter-title{flex:1;min-width:0}
#activeName{font-size:1rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#activeSub{font-size:.73rem;color:var(--muted);margin-top:.1rem}

.ring-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.2rem 1rem}

/* ── RING ── */
#ringTap{
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#1e1e2e,#0d0d14);
  border:3px solid var(--accent);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:transform .08s,box-shadow .15s,border-color .4s;
  box-shadow:0 0 40px rgba(201,169,110,.08)
}
[data-theme="light"] #ringTap{background:radial-gradient(circle at 40% 35%,#fff8ee,#f0e4cc)}
#ringTap:active{transform:scale(.93);box-shadow:0 0 60px rgba(201,169,110,.22)}
#ringTap::after{content:'';position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(201,169,110,.18)}
#count{font-size:3.5rem;color:var(--accent2);font-weight:400;line-height:1}
.tap-hint{font-size:.7rem;color:var(--muted);margin-top:.4rem;letter-spacing:.12em}
.completed-ring{border-color:var(--green)!important;box-shadow:0 0 50px rgba(76,175,125,.18)!important}

/* ── STATS ── */
.stats-row{display:flex;gap:.7rem;width:100%;max-width:340px;margin-top:1.4rem}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.65rem;text-align:center;box-shadow:var(--card-shadow)}
.stat-label{font-size:.6rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.stat-val{font-size:1.3rem;color:var(--accent);margin-top:.2rem}

.done-banner{display:none;background:rgba(76,175,125,.09);border:1px solid rgba(76,175,125,.28);border-radius:10px;padding:.65rem 1rem;text-align:center;font-size:.8rem;color:var(--green);margin-top:.8rem;width:100%;max-width:340px;animation:fadeIn .4s}
.done-banner.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.counter-actions{display:flex;gap:.6rem;width:100%;max-width:340px;margin-top:.9rem}
.counter-actions button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.55rem;border-radius:8px;cursor:pointer;font-size:.76rem;font-family:inherit;transition:all .2s}
.counter-actions button:hover{border-color:var(--accent);color:var(--text)}

/* ── OKUNUŞ TOGGLE ── */
.okunus-bar{display:flex;align-items:center;gap:.5rem;margin-top:.9rem;width:100%;max-width:420px}
#toggleDesc{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.5rem .9rem;font-size:.78rem;font-family:inherit;cursor:pointer;transition:all .2s;text-align:left}
#toggleDesc:hover{border-color:var(--accent);color:var(--accent)}
#audioBtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.5rem .75rem;font-size:.85rem;cursor:pointer;transition:all .2s;white-space:nowrap}
#audioBtn:hover{border-color:var(--accent);color:var(--accent)}
#audioBtn.playing{border-color:var(--green);color:var(--green);background:rgba(76,175,125,.08)}

/* ── DESC BOX ── */
#descBox{
  width:100%;max-width:420px;margin:.5rem auto 0;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  font-size:.88rem;color:var(--text);line-height:1.85;
  max-height:0;overflow:hidden;transition:max-height .4s ease,padding .35s;padding:0 1.1rem;
  opacity:.9
}
#descBox.open{max-height:520px;padding:1rem 1.1rem;overflow-y:auto}

/* ── PAGER ── */
.pager-wrap{width:100%;max-width:420px;margin:.9rem auto 0;display:none}
.pager-wrap.active{display:block}
.pager-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;margin-bottom:.55rem;box-shadow:var(--card-shadow)}
.pager-progress{height:3px;background:var(--border);border-radius:2px;margin:.55rem 0 .45rem}
.pager-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s}
.pager-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted)}
.pager-section-name{font-size:.85rem;color:var(--accent2);margin-top:.25rem;font-weight:400}
.pager-text{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;font-size:.9rem;color:var(--text);line-height:1.9;max-height:280px;overflow-y:auto;opacity:.92;box-shadow:var(--card-shadow)}
.pager-nav{display:flex;gap:.6rem;margin-top:.55rem}
.pager-nav button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.55rem;border-radius:8px;font-size:.78rem;font-family:inherit;cursor:pointer;transition:all .2s}
.pager-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.pager-nav button:disabled{opacity:.3;cursor:default}
.continue-btn{border-color:var(--accent)!important;color:var(--accent)!important;font-weight:600}
.continue-btn:hover:not(:disabled){background:var(--accent)!important;color:#fff!important}
.pager-jump{display:flex;align-items:center;gap:.5rem;margin-top:.45rem}
.pager-jump span{font-size:.7rem;color:var(--muted);white-space:nowrap}
.pager-jump input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.4rem .6rem;border-radius:7px;font-size:.8rem;text-align:center;font-family:inherit}
.pager-jump button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:7px;font-size:.76rem;cursor:pointer;transition:all .2s;font-family:inherit}
.pager-jump button:hover{border-color:var(--accent);color:var(--accent)}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:.75rem 1rem;background:rgba(10,10,15,.97);border-top:1px solid var(--border);display:flex;justify-content:center}
[data-theme="light"] .bottom-bar{background:rgba(245,240,232,.97)}
#resetDataBtn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem 1.2rem;border-radius:8px;font-size:.73rem;font-family:inherit;cursor:pointer;transition:all .2s}
#resetDataBtn:hover{border-color:var(--red);color:var(--red)}

/* ── AUDIO PLAYER ── */
.audio-player{display:none;width:100%;max-width:420px;margin:.6rem auto 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem}
.audio-player.show{display:block}
.audio-player audio{width:100%;border-radius:6px;outline:none}
.audio-player audio::-webkit-media-controls-panel{background:var(--surface2)}
.audio-info{font-size:.72rem;color:var(--muted);margin-bottom:.5rem;text-align:center}
.audio-links{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
.audio-link{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:.4rem .6rem;font-size:.7rem;cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.audio-link:hover,.audio-link.active{border-color:var(--accent);color:var(--accent);background:rgba(201,169,110,.07)}

.hidden{display:none!important}
</style>
</head>
<body>

<div id="menuView">
  <div class="app-header">
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="Tema Değiştir">☀️</button>
    </div>
    <h1>Zikir-Matik</h1>
    <p>Zikirlerinizi takip edin</p>
    <div class="header-divider"></div>
  </div>
  <div class="date-strip" id="dateStrip"></div>
  <div id="freeSlot"></div>
  <div class="section-label">Zikirler &amp; Dualar</div>
  <div id="dhikrList"></div>
  <div style="height:4rem"></div>
</div>

<div id="counterView" class="hidden">
  <div class="counter-header">
    <button id="backBtn">← Geri</button>
    <div class="counter-title">
      <div id="activeName"></div>
      <div id="activeSub"></div>
    </div>
  </div>
  <div class="ring-area">
    <div id="ringTap" tabindex="0" role="button" aria-label="Sayaç">
      <div id="count">0</div>
      <div class="tap-hint">DOKUN</div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Bugün</div>
        <div class="stat-val" id="todayLabel">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label" id="targetTitle">Hedef</div>
        <div class="stat-val" id="targetLabel">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Toplam</div>
        <div class="stat-val" id="totalLabel">0</div>
      </div>
    </div>

    <div class="done-banner" id="doneBanner">✓ Tamamlandı — MâşâAllah!</div>

    <div class="counter-actions">
      <button id="undoBtn">↩ Geri Al</button>
      <button id="resetBtn">Bugünü Sıfırla</button>
    </div>

    <div class="okunus-bar">
      <button id="toggleDesc">📖 Okunuş ▾</button>
      <button id="audioBtn">🔊 Sesli</button>
    </div>

    <div id="descBox"></div>

    <!-- Audio Player -->
    <div class="audio-player" id="audioPlayer">
      <div class="audio-info" id="audioInfo">Sesli okuma seçin</div>
      <audio id="audioEl" controls preload="none"></audio>
      <div class="audio-links" id="audioLinks"></div>
    </div>

    <!-- Pager -->
    <div class="pager-wrap" id="genericPager">
      <div class="pager-header">
        <div class="pager-meta">
          <span id="pagerLabel">Bölüm</span>
          <span id="pagerFraction"></span>
        </div>
        <div class="pager-section-name" id="pagerSectionName"></div>
        <div class="pager-progress"><div class="pager-progress-fill" id="pagerFill"></div></div>
      </div>
      <div class="pager-text" id="pagerText"></div>
      <div class="pager-nav">
        <button id="pagerPrev" disabled>← Önceki</button>
        <button class="continue-btn" id="pagerNext">Devam Et →</button>
      </div>
      <div class="pager-jump">
        <span>Sayfaya git:</span>
        <input type="number" id="jumpInput" min="1" placeholder="No"/>
        <button id="jumpBtn">Git</button>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <button id="resetDataBtn">Tüm Verileri Sıfırla</button>
</div>

<script>
/* ═══════════════════════════════════════════
   AUDIO DATA — YouTube embed IDs & labels
   Her zikir için birden fazla kaynak tanımlandı
═══════════════════════════════════════════ */
const AUDIO_SOURCES = {
  tefriciye: [
    {label:"Salât-ı Nâriye (kısa)",  src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", note:"Örnek — gerçek ses eklenebilir"},
  ],
  ayetel_kursi:[
    {label:"Mishary Rashid",  src:"https://server8.mp3quran.net/afs/002.mp3", note:"Bakara 255"},
  ],
  fetih:[
    {label:"Abdurrahman es-Sudeys", src:"https://server8.mp3quran.net/afs/048.mp3", note:"Fetih Suresi"},
    {label:"Maher Al Muaiqly",      src:"https://server7.mp3quran.net/mahir/048.mp3",note:"Fetih Suresi"},
  ],
  nazar_duasi:[
    {label:"Nazar Duası",  src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", note:"Örnek"},
  ],
  ihlas_felak_nas:[
    {label:"Abdurrahman es-Sudeys", src:"https://server8.mp3quran.net/afs/112.mp3", note:"İhlas Suresi"},
    {label:"Maher — Felak",         src:"https://server7.mp3quran.net/mahir/113.mp3",note:"Felak Suresi"},
    {label:"Maher — Nas",           src:"https://server7.mp3quran.net/mahir/114.mp3",note:"Nas Suresi"},
  ],
  cevsen:[
    {label:"Cevşen-i Kebir (1.kısım)", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", note:"Örnek"},
  ],
  bedr:[
    {label:"Eshâb-ı Bedr Duası",  src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", note:"Örnek"},
  ],
  free:[],
};

/* ═══════════════════════════════════════════
   FETIH — 5 sayfa
═══════════════════════════════════════════ */
const FETIH_PAGES=[
["1. Sayfa (1-7. Ayet)",`Bismillâhirrahmanirrahim.

1. İnnâ fetahnâ leke fethan mubînâ.
2. Li yagfira lekallâhu mâ tekaddeme min zenbike ve mâ teahhara ve yutimme ni'metehu aleyke ve yehdiyeke sırâtan mustekîmâ.
3. Ve yansurakallâhu nasran azîzâ.
4. Huvellezî enzeles sekînete fî kulûbil mu'minîne li yezdâdû îmânen mea îmânihim, ve lillâhi cunûdus semâvâti vel ardı, ve kânallâhu alîmen hakîmâ.
5. Li yudhilel mu'minîne vel mu'minâti cennâtin tecrî min tahtihâl enhâru hâlidîne fîhâ ve yukeffira anhum seyyiâtihim, ve kâne zâlike indallâhi fevzen azîmâ.
6. Ve yuazzibel munâfikîne vel munâfikâti vel muşrikîne vel muşrikâtiz zânnîne billâhi zannes sev'i aleyhim dâiratus sev'i, ve gadiballâhu aleyhim ve leanehum ve eadde lehum cehenneme, ve sâet masîrâ.
7. Ve lillâhi cunûdus semâvâti vel ardı, ve kânallâhu azîzen hakîmâ.`],
["2. Sayfa (8-14. Ayet)",`8. İnnâ erselnâke şâhiden ve mubeşşiran ve nezîrâ.
9. Li tu'minû billâhi ve resûlihî ve tuazzirûhu ve tuvakkırûhu, ve tusebbihûhu bukraten ve asîlâ.
10. İnnellezîne yubâyiûneke innemâ yubâyiûnallâhe, yedullâhi fevka eydîhim, fe men nekese fe innemâ yenkusu alâ nefsihî, ve men evfâ bi mâ âhede aleyhullâhe fe se yu'tîhi ecran azîmâ.
11. Se yekûlu lekel muhallefûne minel a'râbi şegaletnâ emvâlunâ ve ehlûnâ festagfir lenâ, yekûlûne bi elsinetihim mâ leyse fî kulûbihim, kul fe men yemliku lekum minallâhi şey'en in erâde bikum darran ev erâde bikum nef'â, bel kânallâhu bi mâ ta'melûne habîrâ.
12. Bel zanentum en len yenkaliber resûlu vel mu'minûne ilâ ehlîhim ebeden ve zuyyine zâlike fî kulûbikum ve zanentum zannes sev'i ve kuntum kavmen bûrâ.
13. Ve men lem yu'min billâhi ve resûlihî fe innâ a'tednâ lil kâfirîne saîrâ.
14. Ve lillâhi mulkus semâvâti vel ardı, yagfiru li men yeşâu ve yuazzibu men yeşâu, ve kânallahu gafûran rahîmâ.`],
["3. Sayfa (15-21. Ayet)",`15. Se yekûlul muhallefûne izântalaktum ilâ megânime li te'huzûhâ zerûnâ nettebi'kum, yurîdûne en yubeddilû kelâmallâhi, kul len tettebiûnâ kezâlikum kâlallâhu min kablu, fe se yekûlûne bel tahsudûnenâ, bel kânû lâ yefkahûne illâ kalîlâ.
16. Kul lil muhallefîne minel a'râbi se tud'avne ilâ kavmin ulî be'sin şedîdin tukâtilûnehum ev yuslimûne, fe in tutîû yu'tikumullâhu ecran hasenâ, ve in tetevellev kemâ tevelleytum min kablu yuazzibkum azâben elîmâ.
17. Leyse alâl a'mâ haracun ve lâ alâl a'raci haracun ve lâ alâl marîdı haracun, ve men yutııllahe ve resûlehu yudhılhu cennâtin tecrî min tahtihâl enhâru, ve men yetevelle yuazzibhu azâben elîmâ.
18. Lekad radiyallâhu anil mu'minîne iz yubâyiûneke tahteş şecerati fe alime mâ fî kulûbihim fe enzeles sekînete aleyhim ve esâbehum fethan karîbâ.
19. Ve megânime kesîraten ye'huzûnehâ, ve kânallâhu azîzen hakîmâ.
20. Vaadekumullâhu megânime kesîraten te'huzûnehâ fe accele lekum hâzihî ve keffe eydiyen nâsi ankum, ve li tekûne âyeten lil mu'minîne ve yehdiyekum sırâtan mustakîmâ.
21. Ve uhrâ lem takdirû aleyhâ kad ehâtallâhu bihâ, ve kânallâhu alâ kulli şey'in kadîrâ.`],
["4. Sayfa (22-27. Ayet)",`22. Ve lev kâtelekumullezîne keferû le vellevûl edbâra summe lâ yecidûne velîyyen ve lâ nasîrâ.
23. Sunnetallâhilletî kad halet min kablu, ve len tecide li sunnetillâhi tebdîlâ.
24. Ve huvellezî keffe eydiyehum ankum ve eydiyekum anhum bi batni mekkete min ba'di en azferakum aleyhim ve kânallâhu bi mâ ta'melûne basîrâ.
25. Humullezîne keferû ve saddûkum anil mescidil harâmi vel hedye ma'kûfen en yebluga mahıllehu, ve lev lâ ricâlun mu'minûne ve nisâun mu'minâtun lem ta'lemûhum en tetaûhum fe tusîbekum minhum maarratun bi gayri ilmin, li yudhılallâhu fî rahmetihî men yeşâu, lev tezeyyelû le azzebnâllezîne keferû minhum azâben elîmâ.
26. İz cealellezîne keferû fî kulûbihimul hamiyyete hamiyyetel câhiliyyeti fe enzelallâhu sekînetehu alâ resûlihî ve alel mu'minîne ve elzemehum kelimetet takvâ ve kânû ehakka bihâ ve ehlehâ ve kânallâhu bi kulli şey'in alîmâ.

["5. Sayfa (28-29. Ayet)",`28. Huvellezî ersele resûlehu bil hudâ ve dînil hakkı li yuzhirahu alâd dîni kullihî, ve kefâ billâhi şehîdâ.

/* ─── AUDIO ─── */
let audioOpen=false;
audioBtn.addEventListener("click",()=>{
  audioOpen=!audioOpen;
  if(audioOpen){
    audioPlayer.classList.add("show");
    audioBtn.classList.add("playing");
    buildAudioLinks(getActive().id);
  } else {
    audioPlayer.classList.remove("show");
    audioBtn.classList.remove("playing");
    audioEl.pause();
  }
});
function buildAudioLinks(id){
  const srcs=AUDIO_SOURCES[id]||[];
  audioLinks.innerHTML="";
  if(!srcs.length){
    audioInfo.textContent="Bu zikir için ses kaydı henüz eklenmemiştir.";
    audioEl.src="";return;
  }
  audioInfo.textContent="Aşağıdan bir kaynak seçin:";
  srcs.forEach((s,i)=>{
    const btn=document.createElement("button");
    btn.className="audio-link";
    btn.textContent=`▶ ${s.label}`;
    btn.title=s.note||"";
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".audio-link").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      audioEl.src=s.src;
      audioEl.play().catch(()=>{});
      audioInfo.textContent=s.note||s.label;
    });
    audioLinks.appendChild(btn);
  });
  if(srcs.length>0){
    audioEl.src=srcs[0].src;
    audioLinks.children[0].classList.add("active");
  }
}
audioEl.addEventListener("play",()=>audioBtn.classList.add("playing"));
audioEl.addEventListener("pause",()=>audioBtn.classList.remove("playing"));
audioEl.addEventListener("ended",()=>audioBtn.classList.remove("playing"));

/* ─── MENU ─── */
function renderMenu(){
  freeSlot.innerHTML="";dhikrList.innerHTML="";
  state.dhikrs.forEach(d=>{
    const card=document.createElement("div");
    card.className="card";
    const todayPart=d.target?`${d.today} / ${d.target}`:`${d.today} / ∞`;
    const done=d.target&&d.today>=d.target;
    const pct=d.target?Math.min(100,d.today/d.target*100):0;
    card.innerHTML=`
      <div class="title">${d.name}${done?'<span class="completed-badge">✓ Tamam</span>':''}</div>
      <div class="meta">Bugün: <b>${todayPart}</b> · Toplam: <b>${d.total}</b></div>
      <div class="descPreview">${(d.desc||"").split("\n")[0]}</div>
      ${d.target?`<div class="progress-mini"><div class="progress-mini-fill" style="width:${pct}%"></div></div>`:''}
    `;
    card.addEventListener("click",()=>switchToCounter(d.id));
    if(d.free)freeSlot.appendChild(card);
    else dhikrList.appendChild(card);
  });
}

/* ─── PAGER ─── */
let activePagerData=null;
let activePagerMax=0;

function initPager(pages){
  activePagerData=pages;
  activePagerMax=pages.length;
  jumpInput.max=pages.length;
  jumpInput.placeholder=`1-${pages.length}`;
  genericPager.classList.add("active");
  renderPagerPage(getActive().page||0);
}
function renderPagerPage(idx){
  const a=getActive();a.page=idx;save(state);
  const sec=activePagerData[idx];
  pagerSectionName.textContent=sec[0];
  pagerText.textContent=sec[1];
  pagerFraction.textContent=`${idx+1} / ${activePagerMax}`;
  pagerFill.style.width=((idx+1)/activePagerMax*100).toFixed(0)+"%";
  pagerPrev.disabled=idx===0;
  const isLast=idx===activePagerMax-1;
  pagerNext.textContent=isLast?"✓ Tamamlandı":"Devam Et →";
  pagerNext.disabled=isLast;
  jumpInput.value=idx+1;
}
pagerPrev.addEventListener("click",()=>{const c=getActive().page||0;if(c>0){renderPagerPage(c-1);pagerText.scrollTop=0;}});
pagerNext.addEventListener("click",()=>{const c=getActive().page||0;if(c<activePagerMax-1){renderPagerPage(c+1);pagerText.scrollTop=0;}});
jumpBtn.addEventListener("click",()=>{const v=parseInt(jumpInput.value);if(v>=1&&v<=activePagerMax)renderPagerPage(v-1);});
jumpInput.addEventListener("keydown",(e)=>{if(e.key==="Enter"){const v=parseInt(jumpInput.value);if(v>=1&&v<=activePagerMax)renderPagerPage(v-1);}});

/* ─── COUNTER RENDER ─── */
function renderCounter(){
  const a=getActive();
  activeNameEl.textContent=a.name;
  const done=a.target&&a.today>=a.target;
  if(a.target){
    activeSubEl.textContent=`Hedef: ${a.today} / ${a.target}`;
    targetTitleEl.textContent="Hedef";
    targetLabelEl.textContent=a.target;
  } else {
    activeSubEl.textContent="Serbest sayaç";
    targetTitleEl.textContent="Mod";
    targetLabelEl.textContent="∞";
  }
  countEl.textContent=a.today;
  todayLabelEl.textContent=a.today;
  totalLabelEl.textContent=a.total;
  descBoxEl.textContent=a.desc||"";
  doneBanner.className=done?"done-banner show":"done-banner";
  if(done)ringTap.classList.add("completed-ring");
  else ringTap.classList.remove("completed-ring");

  genericPager.classList.remove("active");
  activePagerData=null;
  if(a.id==="cevsen")initPager(CEVSEN.map(s=>[s[0]+". Bölüm",s[1]]));
  else if(a.id==="fetih")initPager(FETIH_PAGES);
  else if(a.id==="bedr")initPager(BEDR_PAGES);
}

/* ─── OKUNUŞ TOGGLE ─── */
toggleDesc.addEventListener("click",()=>{
  const open=descBoxEl.classList.toggle("open");
  toggleDesc.textContent=open?"📖 Okunuş ▴":"📖 Okunuş ▾";
});

/* ─── TAP / UNDO / RESET ─── */
function tap(){
  const a=getActive();
  if(a.target&&a.today>=a.target)return;
  a.today++;a.total++;
  save(state);renderCounter();renderMenu();
  ringTap.style.transform="scale(0.93)";
  setTimeout(()=>ringTap.style.transform="",100);
}
function undo(){
  const a=getActive();
  if(a.today===0)return;
  a.today=Math.max(0,a.today-1);
  a.total=Math.max(0,a.total-1);
  save(state);renderCounter();renderMenu();
}
function resetToday(){
  if(!confirm("Bugünkü sayım sıfırlansın mı?"))return;
  getActive().today=0;save(state);renderCounter();renderMenu();
}
function resetAllData(){
  if(!confirm("Tüm veriler silinsin mi? Bu işlem geri alınamaz."))return;
  localStorage.removeItem(KEY);
  state=structuredClone(DEFAULT_STATE);
  state.lastDate=todayStr();
  save(state);renderMenu();switchToMenu();
}

ringTap.addEventListener("click",tap);
ringTap.addEventListener("keydown",(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();tap();}});
undoBtn.addEventListener("click",undo);
resetBtn.addEventListener("click",resetToday);
backBtn.addEventListener("click",()=>{switchToMenu();renderMenu();});
resetDataBtn.addEventListener("click",resetAllData);

save(state);renderMenu();switchToMenu();
</script>
</body>
</html>

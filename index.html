<style>
*{box-sizing:border-box;margin:0;padding:0}

[data-theme="light"]{
  --bg:#f5f0e8;--surface:#ffffff;--surface2:#f0ebe0;--border:#d4c9b0;
  --accent:#8b5e2a;--accent2:#6b4520;--text:#2c2416;--muted:#7a6a52;
  --green:#2e7d52;--red:#c0392b;--card-shadow:0 1px 6px rgba(139,94,42,.1);
  --btn-bg:#efe8d8;--ring-grad:radial-gradient(circle at 40% 35%,#fff8ee,#f0e4cc);
  --ring-glow:rgba(139,94,42,.15);
}
[data-theme="dark"]{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;
  --accent:#c9a96e;--accent2:#e8c99a;--text:#e8e4d9;--muted:#7a7590;
  --green:#4caf7d;--red:#e05252;--card-shadow:none;
  --btn-bg:#1c1c27;--ring-grad:radial-gradient(circle at 40% 35%,#1e1e2e,#0d0d14);
  --ring-glow:rgba(201,169,110,.1);
}

body{
  background:var(--bg);color:var(--text);
  font-family:'Playfair Display',Georgia,serif;
  min-height:100vh;overflow-x:hidden;
  transition:background .3s,color .3s;
}

/* ── HEADER ── */
#menuView{padding:1.2rem 1rem 5rem}
.app-header{text-align:center;padding:1.8rem 0 1.2rem;position:relative}
.app-header h1{font-size:1.9rem;color:var(--accent2);letter-spacing:.1em;font-weight:600;font-style:italic}
.app-logo{width:48px;height:48px;margin:0 auto .6rem;display:block}
.app-header p{font-size:.75rem;color:var(--muted);margin-top:.3rem;letter-spacing:.1em;font-family:Georgia,serif;font-style:italic}
.header-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:.8rem auto 0}
.header-actions{position:absolute;top:1.8rem;right:0;display:flex;gap:.5rem}
.icon-btn{background:none;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}

.date-strip{text-align:center;font-size:.72rem;color:var(--muted);margin-bottom:1rem;letter-spacing:.06em;font-family:Georgia,serif}
.section-label{font-size:.65rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin:1.2rem 0 .5rem;padding:0 .25rem;font-family:Georgia,serif}

/* ── CARDS ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;
  transition:border-color .2s,background .2s,box-shadow .2s;
  position:relative;overflow:hidden;box-shadow:var(--card-shadow)
}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s;border-radius:14px 0 0 14px}
.card:hover{background:var(--surface2);border-color:var(--accent);box-shadow:0 4px 16px var(--ring-glow)}
.card:hover::before{opacity:1}
.card .title{font-size:.95rem;color:var(--text);margin-bottom:.3rem;font-weight:600}
.card .meta{font-size:.73rem;color:var(--muted);font-family:Georgia,serif}
.card .meta b{color:var(--accent)}
.card .descPreview{font-size:.72rem;color:var(--muted);margin-top:.35rem;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.7;font-family:Georgia,serif}
.card .progress-mini{height:2px;background:var(--border);border-radius:2px;margin-top:.6rem;overflow:hidden}
.card .progress-mini-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s}
.completed-badge{background:rgba(76,175,125,.12);border:1px solid rgba(76,175,125,.3);color:var(--green);border-radius:20px;padding:.15rem .7rem;font-size:.64rem;margin-left:.5rem;vertical-align:middle;font-family:Georgia,serif}

/* ── COUNTER VIEW ── */
#counterView{display:flex;flex-direction:column;min-height:100vh;padding-bottom:2rem}
.counter-header{padding:.9rem 1rem .5rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border)}
#backBtn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s;font-family:inherit}
#backBtn:hover{color:var(--text);border-color:var(--accent)}
.counter-title{flex:1;min-width:0}
#activeName{font-size:.95rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
#activeSub{font-size:.72rem;color:var(--muted);margin-top:.1rem;font-family:Georgia,serif}

.ring-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.2rem 1rem}

/* ── RING ── */
#ringTap{
  width:210px;height:210px;border-radius:50%;
  background:var(--ring-grad);
  border:3px solid var(--accent);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;user-select:none;-webkit-tap-highlight-color:transparent;
  transition:transform .08s,box-shadow .15s;
  box-shadow:0 0 40px var(--ring-glow),inset 0 1px 0 rgba(255,255,255,.1)
}
#ringTap:active{transform:scale(.93);box-shadow:0 0 60px var(--ring-glow)}
#ringTap::after{content:'';position:absolute;inset:10px;border-radius:50%;border:1px solid rgba(139,94,42,.2)}
[data-theme="dark"] #ringTap::after{border-color:rgba(201,169,110,.18)}
#count{font-size:3.5rem;color:var(--accent2);font-weight:400;line-height:1;font-family:'Playfair Display',serif}
.tap-hint{font-size:.65rem;color:var(--muted);margin-top:.4rem;letter-spacing:.18em;font-family:Georgia,serif}
.completed-ring{border-color:var(--green)!important;box-shadow:0 0 50px rgba(76,175,125,.2)!important}

/* ── STATS ── */
.stats-row{display:flex;gap:.7rem;width:100%;max-width:340px;margin-top:1.4rem}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.65rem;text-align:center;box-shadow:var(--card-shadow)}
.stat-label{font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-family:Georgia,serif}
.stat-val{font-size:1.3rem;color:var(--accent);margin-top:.2rem;font-family:'Playfair Display',serif}

.done-banner{display:none;background:rgba(76,175,125,.09);border:1px solid rgba(76,175,125,.28);border-radius:10px;padding:.65rem 1rem;text-align:center;font-size:.8rem;color:var(--green);margin-top:.8rem;width:100%;max-width:340px;animation:fadeIn .4s;font-family:Georgia,serif}
.done-banner.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.counter-actions{display:flex;gap:.6rem;width:100%;max-width:340px;margin-top:.9rem}
.counter-actions button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.55rem;border-radius:8px;cursor:pointer;font-size:.74rem;font-family:inherit;transition:all .2s}
.counter-actions button:hover{border-color:var(--accent);color:var(--text)}

/* ── TAB BAR ── */
.tab-bar{display:flex;gap:0;width:100%;max-width:420px;margin-top:.9rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface)}
.tab-btn{flex:1;padding:.5rem .4rem;font-size:.72rem;font-family:Georgia,serif;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .2s;border-right:1px solid var(--border)}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:600}
.tab-btn:hover:not(.active){background:var(--surface2);color:var(--text)}

/* ── CONTENT PANEL ── */
.content-panel{
  width:100%;max-width:420px;margin:.5rem auto 0;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  font-size:.88rem;color:var(--text);line-height:1.9;
  max-height:0;overflow:hidden;transition:max-height .4s ease,padding .35s;padding:0 1.1rem;
}
.content-panel.open{max-height:560px;padding:1rem 1.1rem;overflow-y:auto}
.arabic-text{
  font-family:'Noto Naskh Arabic','Amiri',serif;
  font-size:1.25rem;line-height:2.2;direction:rtl;text-align:right;
  color:var(--accent2);
}

/* ── AUDIO TOGGLE ── */
.okunus-bar{display:flex;align-items:center;gap:.5rem;margin-top:.6rem;width:100%;max-width:420px;flex-wrap:wrap}
#audioBtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.5rem .75rem;font-size:.78rem;cursor:pointer;transition:all .2s;font-family:Georgia,serif;flex:1}
#audioBtn:hover{border-color:var(--accent);color:var(--accent)}
#audioBtn.playing{border-color:var(--green);color:var(--green);background:rgba(76,175,125,.08)}
#loopBtn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.5rem .65rem;font-size:.78rem;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:Georgia,serif}
#loopBtn.on{border-color:var(--accent);color:var(--accent);background:rgba(139,94,42,.08)}
#loopBtn:hover{border-color:var(--accent);color:var(--accent)}

/* ── AUDIO PLAYER ── */
.audio-player{display:none;width:100%;max-width:420px;margin:.6rem auto 0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem}
.audio-player.show{display:block}
.audio-player audio{width:100%;border-radius:6px;outline:none}
.audio-info{font-size:.72rem;color:var(--muted);margin-bottom:.5rem;text-align:center;font-family:Georgia,serif}
.audio-links{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
.audio-link{flex:1;min-width:120px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:.4rem .6rem;font-size:.7rem;cursor:pointer;text-align:center;transition:all .2s;font-family:Georgia,serif}
.audio-link:hover,.audio-link.active{border-color:var(--accent);color:var(--accent);background:rgba(139,94,42,.07)}
[data-theme="dark"] .audio-link:hover,[data-theme="dark"] .audio-link.active{background:rgba(201,169,110,.07)}
.yt-link{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:.35rem .6rem;font-size:.68rem;cursor:pointer;text-align:center;transition:all .2s;font-family:Georgia,serif;text-decoration:none;display:inline-block;margin-top:.4rem}
.yt-link:hover{border-color:#ff4444;color:#ff4444}

/* ── PAGER ── */
.pager-wrap{width:100%;max-width:420px;margin:.9rem auto 0;display:none}
.pager-wrap.active{display:block}
.pager-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;margin-bottom:.55rem;box-shadow:var(--card-shadow)}
.pager-progress{height:3px;background:var(--border);border-radius:2px;margin:.55rem 0 .45rem}
.pager-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .35s}
.pager-meta{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);font-family:Georgia,serif}
.pager-section-name{font-size:.83rem;color:var(--accent2);margin-top:.25rem;font-weight:600}
.pager-text{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;font-size:.88rem;color:var(--text);line-height:1.9;max-height:260px;overflow-y:auto;opacity:.92;box-shadow:var(--card-shadow);font-family:Georgia,serif}
.pager-text.arabic{font-family:'Noto Naskh Arabic','Amiri',serif;font-size:1.15rem;direction:rtl;text-align:right;line-height:2.4;color:var(--accent2)}
.pager-nav{display:flex;gap:.6rem;margin-top:.55rem}
.pager-nav button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.55rem;border-radius:8px;font-size:.76rem;font-family:inherit;cursor:pointer;transition:all .2s}
.pager-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.pager-nav button:disabled{opacity:.3;cursor:default}
.continue-btn{border-color:var(--accent)!important;color:var(--accent)!important;font-weight:600}
.continue-btn:hover:not(:disabled){background:var(--accent)!important;color:#fff!important}
.pager-jump{display:flex;align-items:center;gap:.5rem;margin-top:.45rem}
.pager-jump span{font-size:.68rem;color:var(--muted);white-space:nowrap;font-family:Georgia,serif}
.pager-jump input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.4rem .6rem;border-radius:7px;font-size:.8rem;text-align:center;font-family:inherit}
.pager-jump button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:7px;font-size:.74rem;cursor:pointer;transition:all .2s;font-family:inherit}
.pager-jump button:hover{border-color:var(--accent);color:var(--accent)}
.pager-lang-toggle{display:flex;gap:.4rem;margin-bottom:.5rem}
.pager-lang-btn{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:.38rem;font-size:.7rem;cursor:pointer;transition:all .2s;font-family:Georgia,serif}
.pager-lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── BOTTOM BAR ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:.75rem 1rem;background:rgba(245,240,232,.97);border-top:1px solid var(--border);display:flex;justify-content:center}
[data-theme="dark"] .bottom-bar{background:rgba(10,10,15,.97)}
#resetDataBtn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem 1.2rem;border-radius:8px;font-size:.72rem;font-family:inherit;cursor:pointer;transition:all .2s}
#resetDataBtn:hover{border-color:var(--red);color:var(--red)}

.hidden{display:none!important}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<div id="menuView">
  <div class="app-header">
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn" title="Tema Değiştir">🌙</button>
    </div>
    <!-- SVG Logo -->
    <svg class="app-logo" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <circle cx="40" cy="40" r="38" fill="var(--accent)" opacity=".15"/>
      <circle cx="40" cy="40" r="35" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity=".6"/>
      <circle cx="40" cy="40" r="26" fill="none" stroke="var(--accent)" stroke-width="1" opacity=".35"/>
      <text x="40" y="38" font-family="serif" font-size="22" fill="var(--accent2)" text-anchor="middle" dominant-baseline="middle">☪</text>
      <text x="40" y="58" font-family="Georgia,serif" font-size="8" fill="var(--muted)" text-anchor="middle" letter-spacing="2">ZİKİR</text>
    </svg>
    <h1>Zikir-Matik</h1>
    <p>Zikirlerinizi takip edin</p>
    <div class="header-divider"></div>
  </div>
  <div class="date-strip" id="dateStrip"></div>
  <div id="freeSlot"></div>
  <div class="section-label">Zikirler &amp; Dualar</div>
  <div id="dhikrList"></div>
  <div style="height:4rem"></div>
</div>

<div id="counterView" class="hidden">
  <div class="counter-header">
    <button id="backBtn">← Geri</button>
    <div class="counter-title">
      <div id="activeName"></div>
      <div id="activeSub"></div>
    </div>
  </div>
  <div class="ring-area">
    <div id="ringTap" tabindex="0" role="button" aria-label="Sayaç">
      <div id="count">0</div>
      <div class="tap-hint">DOKUN</div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Bugün</div>
        <div class="stat-val" id="todayLabel">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label" id="targetTitle">Hedef</div>
        <div class="stat-val" id="targetLabel">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Toplam</div>
        <div class="stat-val" id="totalLabel">0</div>
      </div>
    </div>

    <div class="done-banner" id="doneBanner">✓ Tamamlandı — MâşâAllah!</div>

    <div class="counter-actions">
      <button id="undoBtn">↩ Geri Al</button>
      <button id="resetBtn">Bugünü Sıfırla</button>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="okunus">📖 Okunuş</button>
      <button class="tab-btn" data-tab="arabic">عربي Arapça</button>
    </div>

    <!-- Okunuş Panel -->
    <div class="content-panel open" id="panelOkunus"></div>

    <!-- Arapça Panel -->
    <div class="content-panel" id="panelArabic">
      <div class="arabic-text" id="arabicText"></div>
    </div>

    <!-- Audio Controls -->
    <div class="okunus-bar">
      <button id="audioBtn">🔊 Sesli Dinle</button>
      <button id="loopBtn" title="Tekrarlı dinle">🔁 Tekrar</button>
    </div>

    <div class="audio-player" id="audioPlayer">
      <div class="audio-info" id="audioInfo">Sesli okuma seçin</div>
      <audio id="audioEl" controls preload="none"></audio>
      <div class="audio-links" id="audioLinks"></div>
    </div>

    <!-- Pager -->
    <div class="pager-wrap" id="genericPager">
      <div class="pager-header">
        <div class="pager-lang-toggle">
          <button class="pager-lang-btn active" id="pagerLangTr">Türkçe Okunuş</button>
          <button class="pager-lang-btn" id="pagerLangAr">عربي Arapça</button>
        </div>
        <div class="pager-meta">
          <span id="pagerLabel">Bölüm</span>
          <span id="pagerFraction"></span>
        </div>
        <div class="pager-section-name" id="pagerSectionName"></div>
        <div class="pager-progress"><div class="pager-progress-fill" id="pagerFill"></div></div>
      </div>
      <div class="pager-text" id="pagerText"></div>
      <div class="pager-nav">
        <button id="pagerPrev" disabled>← Önceki</button>
        <button class="continue-btn" id="pagerNext">Devam Et →</button>
      </div>
      <div class="pager-jump">
        <span>Sayfaya git:</span>
        <input type="number" id="jumpInput" min="1" placeholder="No"/>
        <button id="jumpBtn">Git</button>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <button id="resetDataBtn">Tüm Verileri Sıfırla</button>
</div>

<script>
/* ═══════════════════════════════════════════
   ARABIC TEXTS

function buildAudioLinks(id){
  const srcs=AUDIO_SOURCES[id]||[];
  audioLinks.innerHTML="";
  if(!srcs.length){
    audioInfo.textContent="Bu zikir için ses kaydı eklenmemiştir.";
    audioEl.src="";audioEl.style.display="none";return;
  }
  audioEl.style.display="";
  audioInfo.textContent="Aşağıdan bir kaynak seçin:";
  srcs.forEach((s,i)=>{
    if(s.yt){
      const a=document.createElement("a");
      a.className="yt-link";a.href=s.yt;a.target="_blank";a.rel="noopener noreferrer";
      a.textContent="▶ YouTube'da İzle — "+s.label;
      audioLinks.appendChild(a);
      if(!s.src){audioEl.src="";audioEl.style.display="none";}
    } else {
      const btn=document.createElement("button");
      btn.className="audio-link";
      btn.textContent="▶ "+s.label;
      btn.title=s.note||"";
      btn.addEventListener("click",()=>{
        document.querySelectorAll(".audio-link").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        audioEl.src=s.src;
        audioEl.loop=loopOn;
        audioEl.play().catch(()=>{});
        audioInfo.textContent=s.note||s.label;
      });
      audioLinks.appendChild(btn);
      if(i===0&&s.src){audioEl.src=s.src;audioLinks.children[0].classList.add("active");}
    }
  });
}
audioEl.addEventListener("play",()=>audioBtn.classList.add("playing"));

/* ─── PAGER ─── */
function initPager(pages){
  activePagerData=pages;activePagerMax=pages.length;
  jumpInput.max=pages.length;jumpInput.placeholder=`1-${pages.length}`;
  genericPager.classList.add("active");
  renderPagerPage(getActive().page||0);
}
function renderPagerPage(idx){
  const a=getActive();a.page=idx;save(state);
  const sec=activePagerData[idx];
  pagerSectionName.textContent=sec[0];
  // sec[1]=TR, sec[2]=AR (if available)
  if(pagerLang==="ar"&&sec[2]){
    pagerText.textContent=sec[2];
    pagerText.classList.add("arabic");
  } else {
    pagerText.textContent=sec[1]||sec[0];
    pagerText.classList.remove("arabic");
  }
  pagerFraction.textContent=`${idx+1} / ${activePagerMax}`;
  pagerFill.style.width=((idx+1)/activePagerMax*100).toFixed(0)+"%";
  pagerPrev.disabled=idx===0;
  const isLast=idx===activePagerMax-1;
  pagerNext.textContent=isLast?"✓ Tamamlandı":"Devam Et →";
  pagerNext.disabled=isLast;
  jumpInput.value=idx+1;
}
pagerPrev.addEventListener("click",()=>{const c=getActive().page||0;if(c>0){renderPagerPage(c-1);pagerText.scrollTop=0;}});
pagerNext.addEventListener("click",()=>{const c=getActive().page||0;if(c<activePagerMax-1){renderPagerPage(c+1);pagerText.scrollTop=0;}});
jumpBtn.addEventListener("click",()=>{const v=parseInt(jumpInput.value);if(v>=1&&v<=activePagerMax)renderPagerPage(v-1);});
jumpInput.addEventListener("keydown",(e)=>{if(e.key==="Enter"){const v=parseInt(jumpInput.value);if(v>=1&&v<=activePagerMax)renderPagerPage(v-1);}});

  countEl.textContent=a.today;
  todayLabelEl.textContent=a.today;
  totalLabelEl.textContent=a.total;

  panelOkunus.textContent=a.desc||"";
  const ar=ARABIC[a.id]||"";
  arabicText.textContent=ar;
  // Show/hide arabic tab
  tabBar.style.display=ar?"flex":"none";

  doneBanner.className=done?"done-banner show":"done-banner";
  if(done)ringTap.classList.add("completed-ring");
  else ringTap.classList.remove("completed-ring");

  genericPager.classList.remove("active");activePagerData=null;
  if(a.id==="cevsen")initPager(CEVSEN.map(s=>[s[0]+". Bölüm",s[1],null]));
  else if(a.id==="fetih")initPager(FETIH_PAGES);
  else if(a.id==="bedr")initPager(BEDR_PAGES);
  else if(a.id==="yasin")initPager(YASIN_PAGES);
  else if(a.id==="cuz6s3")initPager(CUZ6_PAGES);
}

/* ─── TAP / UNDO / RESET ─── */
function tap(){
  const a=getActive();
  if(a.target&&a.today>=a.target)return;
  a.today++;a.total++;save(state);renderCounter();renderMenu();
  ringTap.style.transform="scale(0.93)";
  setTimeout(()=>ringTap.style.transform="",100);
}
function undo(){
  const a=getActive();if(a.today===0)return;
  a.today=Math.max(0,a.today-1);a.total=Math.max(0,a.total-1);
  save(state);renderCounter();renderMenu();
}
function resetToday(){
  if(!confirm("Bugünkü sayım sıfırlansın mı?"))return;
  getActive().today=0;save(state);renderCounter();renderMenu();
}
function resetAllData(){
  if(!confirm("Tüm veriler silinsin mi? Bu işlem geri alınamaz."))return;
  localStorage.removeItem(KEY);state=structuredClone(DEFAULT_STATE);state.lastDate=todayStr();
  document.documentElement.setAttribute('data-theme','light');themeBtn.textContent='🌙';
  save(state);renderMenu();switchToMenu();
}

ringTap.addEventListener("click",tap);
ringTap.addEventListener("keydown",(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();tap();}});
undoBtn.addEventListener("click",undo);
resetBtn.addEventListener("click",resetToday);
backBtn.addEventListener("click",()=>{switchToMenu();renderMenu();});
resetDataBtn.addEventListener("click",resetAllData);

save(state);renderMenu();switchToMenu();
</script>

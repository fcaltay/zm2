<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zikir-Matik</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c27;--border:#2a2a3a;
    --accent:#c9a96e;--accent2:#e8c99a;--text:#e8e4d9;--muted:#7a7590;
    --green:#4caf7d;--ring-size:220px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden}
  
  /* MENU */
  #menuView{padding:1.5rem 1rem 5rem}
  .app-header{text-align:center;padding:2rem 0 1.5rem}
  .app-header h1{font-size:1.6rem;color:var(--accent2);letter-spacing:.1em;font-weight:400}
  .app-header p{font-size:.8rem;color:var(--muted);margin-top:.3rem;letter-spacing:.05em}
  
  .section-label{font-size:.7rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin:1.2rem 0 .6rem;padding:0 .25rem}
  
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:14px;
    padding:1rem 1.1rem;margin-bottom:.7rem;cursor:pointer;
    transition:border-color .2s,background .2s;position:relative;overflow:hidden
  }
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity .2s;border-radius:14px 0 0 14px}
  .card:hover{background:var(--surface2);border-color:var(--accent)}
  .card:hover::before{opacity:1}
  .card .title{font-size:1rem;color:var(--text);margin-bottom:.3rem}
  .card .meta{font-size:.78rem;color:var(--muted)}
  .card .meta b{color:var(--accent)}
  .card .descPreview{font-size:.72rem;color:var(--muted);margin-top:.4rem;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.7}
  
  /* COUNTER */
  #counterView{display:flex;flex-direction:column;min-height:100vh;padding-bottom:2rem}
  .counter-header{padding:1rem 1rem .5rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border)}
  #backBtn{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:8px;cursor:pointer;font-size:.8rem;transition:color .2s,border-color .2s}
  #backBtn:hover{color:var(--text);border-color:var(--accent)}
  .counter-title{flex:1}
  #activeName{font-size:1rem;color:var(--text)}
  #activeSub{font-size:.75rem;color:var(--muted);margin-top:.1rem}
  
  .ring-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
  #ringTap{
    width:var(--ring-size);height:var(--ring-size);border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#1e1e2e,#0d0d14);
    border:3px solid var(--accent);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;user-select:none;-webkit-tap-highlight-color:transparent;
    transition:transform .08s,box-shadow .08s;
    box-shadow:0 0 40px rgba(201,169,110,.08)
  }
  #ringTap:active{transform:scale(.93);box-shadow:0 0 60px rgba(201,169,110,.18)}
  #ringTap::after{content:'';position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(201,169,110,.15)}
  #count{font-size:3.5rem;color:var(--accent2);font-weight:400;line-height:1}
  .tap-hint{font-size:.72rem;color:var(--muted);margin-top:.4rem;letter-spacing:.1em}
  
  .stats-row{display:flex;gap:.7rem;width:100%;max-width:340px}
  .stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.7rem;text-align:center}
  .stat-box .stat-label{font-size:.65rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .stat-box .stat-val{font-size:1.3rem;color:var(--accent);margin-top:.2rem}
  
  .counter-actions{display:flex;gap:.6rem;width:100%;max-width:340px;margin-top:1rem}
  .counter-actions button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.55rem;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:inherit;transition:all .2s}
  .counter-actions button:hover{border-color:var(--accent);color:var(--text)}
  
  /* DESC BOX */
  #descBox{
    width:100%;max-width:420px;margin:1.2rem auto 0;
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    font-size:.78rem;color:var(--muted);line-height:1.7;
    max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s;padding:0 1rem
  }
  #descBox.open{max-height:400px;padding:.9rem 1rem;overflow-y:auto}
  #toggleDesc{
    background:none;border:1px solid var(--border);color:var(--muted);
    border-radius:20px;padding:.3rem .9rem;font-size:.72rem;font-family:inherit;
    cursor:pointer;margin-top:.8rem;transition:all .2s
  }
  #toggleDesc:hover{border-color:var(--accent);color:var(--accent)}

  /* CEVŞEN PAGINATION */
  #cevsenPager{width:100%;max-width:420px;margin:1rem auto 0;display:none}
  #cevsenPager.active{display:block}
  .pager-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.8rem 1rem;margin-bottom:.6rem}
  .pager-progress{height:3px;background:var(--border);border-radius:2px;margin:.6rem 0 .5rem}
  .pager-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
  .pager-meta{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted)}
  .pager-section-name{font-size:.85rem;color:var(--accent2);margin-top:.3rem}
  
  .pager-text{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:1rem;font-size:.78rem;color:var(--muted);line-height:1.75;
    max-height:260px;overflow-y:auto
  }
  .pager-nav{display:flex;gap:.6rem;margin-top:.6rem}
  .pager-nav button{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.55rem;border-radius:8px;font-size:.78rem;font-family:inherit;cursor:pointer;transition:all .2s}
  .pager-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
  .pager-nav button:disabled{opacity:.3;cursor:default}
  .pager-nav .continue-btn{border-color:var(--accent);color:var(--accent);font-weight:600}
  .pager-nav .continue-btn:hover{background:var(--accent);color:#0a0a0f}
  
  .pager-jump{display:flex;align-items:center;gap:.5rem;margin-top:.5rem}
  .pager-jump input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.4rem .6rem;border-radius:7px;font-size:.8rem;text-align:center}
  .pager-jump button{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:7px;font-size:.78rem;cursor:pointer;transition:all .2s}
  .pager-jump button:hover{border-color:var(--accent);color:var(--accent)}

  /* BOTTOM RESET */
  .bottom-bar{
    position:fixed;bottom:0;left:0;right:0;
    padding:.8rem 1rem;background:rgba(10,10,15,.95);
    border-top:1px solid var(--border);display:flex;justify-content:center
  }
  #resetDataBtn{
    background:none;border:1px solid var(--border);color:var(--muted);
    padding:.4rem 1.2rem;border-radius:8px;font-size:.75rem;font-family:inherit;
    cursor:pointer;transition:all .2s
  }
  #resetDataBtn:hover{border-color:#e05252;color:#e05252}

  .hidden{display:none!important}
  
  /* Completed state */
  .completed-badge{
    background:rgba(76,175,125,.1);border:1px solid rgba(76,175,125,.3);
    color:var(--green);border-radius:20px;padding:.2rem .8rem;font-size:.72rem;
    margin-left:.5rem;vertical-align:middle
  }
</style>
</head>
<body>

<div id="menuView">
  <div class="app-header">
    <h1>Zikir-Matik</h1>
    <p>Zikirlerinizi takip edin</p>
  </div>
  <div id="freeSlot"></div>
  <div class="section-label">Zikirler</div>
  <div id="dhikrList"></div>
  <div style="height:4rem"></div>
</div>

<div id="counterView" class="hidden">
  <div class="counter-header">
    <button id="backBtn">← Geri</button>
    <div class="counter-title">
      <div id="activeName"></div>
      <div id="activeSub"></div>
    </div>
  </div>

  <div class="ring-area">
    <div id="ringTap" tabindex="0" role="button" aria-label="Sayaç">
      <div id="count">0</div>
      <div class="tap-hint">DOKUN</div>
    </div>

    <div class="stats-row" style="margin-top:1.5rem">
      <div class="stat-box">
        <div class="stat-label">Bugün</div>
        <div class="stat-val" id="todayLabel">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label" id="targetTitle">Hedef</div>
        <div class="stat-val" id="targetLabel">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Toplam</div>
        <div class="stat-val" id="totalLabel">0</div>
      </div>
    </div>

    <div class="counter-actions">
      <button id="undoBtn">↩ Geri Al</button>
      <button id="resetBtn">Bugünü Sıfırla</button>
    </div>

    <button id="toggleDesc">Okunuş ▾</button>

    <div id="descBox"></div>

    <!-- Cevşen Pager -->
    <div id="cevsenPager">
      <div class="pager-header">
        <div class="pager-meta">
          <span id="pagerSectionLabel">Bölüm</span>
          <span id="pagerFraction"></span>
        </div>
        <div class="pager-section-name" id="pagerSectionName"></div>
        <div class="pager-progress"><div class="pager-progress-fill" id="pagerFill"></div></div>
      </div>
      <div class="pager-text" id="pagerText"></div>
      <div class="pager-nav">
        <button id="pagerPrev" disabled>← Önceki</button>
        <button class="continue-btn" id="pagerNext">Devam Et →</button>
      </div>
      <div class="pager-jump">
        <span style="font-size:.72rem;color:var(--muted);white-space:nowrap">Sayfaya git:</span>
        <input type="number" id="jumpInput" min="1" max="100" placeholder="1-100"/>
        <button id="jumpBtn">Git</button>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottomBar">
  <button id="resetDataBtn">Tüm Verileri Sıfırla</button>
</div>

     desc:"Okunuş: Allâhumme salli salâten kâmileten ve sellim selâmen tâmmen alâ Seyyidinâ Muhammedinillezî tenhallü bihil ukadü ve tenfericu bihil kürebü ve tukdâ bihil havâicu ve tünâlü bihir reğâibü ve hüsnül havâtimi ve yustaskal ğamâmu bi vechihil kerîm ve alâ âlihî ve sahbihî fî külli lemhatin ve nefesin bi adedi külli ma'lûmin lek."},
    {id:"free",name:"Serbest Sayaç",free:true,target:null,today:0,total:0,
     desc:"Hedefsiz sayaç. İstediğin kadar say."},
    {id:"ayetel_kursi",name:"Ayetel Kürsi",target:3,today:0,total:0,
     desc:"Okunuş: Bismillâhirrahmânirrahîm. Allâhu lâ ilâhe illâ huvel hayyul kayyûm. Lâ te'huzühû sinetün velâ nevm. Lehû mâ fis semâvâti ve mâ fil ard. Men zellezî yeşfeu indehû illâ bi iznih. Ya'lemu mâ beyne eydîhim ve mâ halfehum. Ve lâ yuhîtûne bi şey'in min ilmihî illâ bi mâ şâe. Vesia kürsiyyühüs semâvâti vel ard. Ve lâ yeûdühû hıfzuhumâ. Ve huvel aliyyül azîm."},
    {id:"fetih",name:"Fetih Suresi",target:1,today:0,total:0,
     desc:"Okunuş: Bismillâhirrahmanirrahim. 1. İnnâ fetahnâ leke fethan mubînâ. 2. Li yagfira lekallâhu mâ tekaddeme min zenbike ve mâ teahhara ve yutimme ni'metehu aleyke ve yehdiyeke sırâtan mustekîmâ. 3. Ve yansurakallâhu nasran azîzâ. 4. Huvellezî enzeles sekînete fî kulûbil mu'minîne li yezdâdû îmânen mea îmânihim..."},
    {id:"nazar_duasi",name:"Nazar Duası",target:7,today:0,total:0,
     desc:"Okunuş: Eûzü bi kelimâtillâhi't-tâmmeti min kulli şeytânin ve hâmmeh ve min kulli aynin lâmmeh."},
    {id:"ihlas_felak_nas",name:"İhlas + Felak + Nas",target:3,today:0,total:0,
     desc:"Okunuş: Bismillâhirrahmânirrahîm. Kul hüvallâhu ehad. Allâhü's-samed. Lem yelid ve lem yûled. Ve lem yekun lehû kufuven ehad. Bismillâhirrahmânirrahîm. Kul eûzü bi rabbil felak. Min şerri mâ halak. Ve min şerri ğâsikın izâ vekab. Ve min şerri'n-neffâsâti fil ukad. Ve min şerri hâsidin izâ hased. Bismillâhirrahmânirrahîm. Kul eûzü bi rabbin nâs. Melikin nâs. İlâhin nâs. Min şerril vesvâsil hannâs. Ellezî yuvesvisu fî sudûrin nâs. Minel cinneti ven nâs."},
    {id:"cevsen",name:"Cevşen-i Kebir",target:1,today:0,total:0,cevsenPage:0,
     desc:"Cevşen-i Kebir — 100 bölümden oluşan dua. Aşağıdan bölüm bölüm okuyabilirsiniz."}
  ],
  activeId:"free"
};

let state=load();
if(!state||!Array.isArray(state.dhikrs)){state=structuredClone(DEFAULT_STATE)}
state.dhikrs.forEach(d=>{
  if(!('today'in d))d.today=0;
  if(!('total'in d))d.total=0;
  if(d.id==='cevsen'&&!('cevsenPage'in d))d.cevsenPage=0;
});

const freeSlot=document.getElementById("freeSlot");
const dhikrList=document.getElementById("dhikrList");
const menuView=document.getElementById("menuView");
const counterView=document.getElementById("counterView");
const ringTap=document.getElementById("ringTap");
const countEl=document.getElementById("count");
const activeNameEl=document.getElementById("activeName");
const activeSubEl=document.getElementById("activeSub");
const todayLabelEl=document.getElementById("todayLabel");
const totalLabelEl=document.getElementById("totalLabel");
const targetTitleEl=document.getElementById("targetTitle");
const targetLabelEl=document.getElementById("targetLabel");
const descBoxEl=document.getElementById("descBox");
const backBtn=document.getElementById("backBtn");
const undoBtn=document.getElementById("undoBtn");
const resetBtn=document.getElementById("resetBtn");
const resetDataBtn=document.getElementById("resetDataBtn");
const toggleDesc=document.getElementById("toggleDesc");
const cevsenPager=document.getElementById("cevsenPager");
const pagerText=document.getElementById("pagerText");
const pagerFill=document.getElementById("pagerFill");
const pagerFraction=document.getElementById("pagerFraction");
const pagerSectionName=document.getElementById("pagerSectionName");
const pagerPrev=document.getElementById("pagerPrev");
const pagerNext=document.getElementById("pagerNext");
const jumpInput=document.getElementById("jumpInput");
const jumpBtn=document.getElementById("jumpBtn");
const bottomBar=document.getElementById("bottomBar");

function getActive(){return state.dhikrs.find(d=>d.id===state.activeId)||state.dhikrs[0]}

function switchToMenu(){
  counterView.classList.add("hidden");
  menuView.classList.remove("hidden");
  bottomBar.style.display="flex";
}
function switchToCounter(id){
  state.activeId=id;save(state);
  menuView.classList.add("hidden");
  counterView.classList.remove("hidden");
  bottomBar.style.display="none";
  descBoxEl.classList.remove("open");
  toggleDesc.textContent="Okunuş ▾";
  renderCounter();
}

function renderMenu(){
  freeSlot.innerHTML="";dhikrList.innerHTML="";
  state.dhikrs.forEach(d=>{
    const card=document.createElement("div");
    card.className="card";
    const todayPart=d.target?`${d.today} / ${d.target}`:`${d.today} / ∞`;
    const done=d.target&&d.today>=d.target;
    card.innerHTML=`
      <div class="title">${d.name}${done?'<span class="completed-badge">Tamam</span>':''}</div>
      <div class="meta">Bugün: <b>${todayPart}</b> · Toplam: <b>${d.total}</b></div>
      <div class="descPreview">${(d.desc||"").split("\n").slice(0,1).join("")}</div>
    `;
    card.addEventListener("click",()=>switchToCounter(d.id));
    if(d.free)freeSlot.appendChild(card);
    else dhikrList.appendChild(card);
  });
}

function renderCounter(){
  const a=getActive();
  activeNameEl.textContent=a.name;
  if(a.target){
    activeSubEl.textContent=`Hedef: ${a.target}`;
    targetTitleEl.textContent="Hedef";
    targetLabelEl.textContent=a.target;
  } else {
    activeSubEl.textContent="Serbest sayaç";
    targetTitleEl.textContent="Mod";
    targetLabelEl.textContent="∞";
  }
  countEl.textContent=a.today;
  todayLabelEl.textContent=a.today;
  totalLabelEl.textContent=a.total;
  descBoxEl.textContent=a.desc||"";

  if(a.id==="cevsen"){
    cevsenPager.classList.add("active");
    renderCevsenPage(a.cevsenPage||0);
  } else {
    cevsenPager.classList.remove("active");
  }
}

function renderCevsenPage(idx){
  const a=getActive();
  a.cevsenPage=idx;
  save(state);
  const sec=CEVSEN_SECTIONS[idx];
  pagerText.textContent=sec[1];
  pagerFraction.textContent=`${idx+1} / 100`;
  pagerSectionName.textContent=`${idx+1}. Bölüm`;
  const pct=((idx+1)/100*100).toFixed(0);
  pagerFill.style.width=pct+"%";
  pagerPrev.disabled=idx===0;
  pagerNext.textContent=idx===99?"✓ Tamamlandı":"Devam Et →";
  pagerNext.disabled=idx===99;
  jumpInput.value=idx+1;
}

pagerPrev.addEventListener("click",()=>{
  const a=getActive();
  const cur=a.cevsenPage||0;
  if(cur>0)renderCevsenPage(cur-1);
});
pagerNext.addEventListener("click",()=>{
  const a=getActive();
  const cur=a.cevsenPage||0;
  if(cur<99){renderCevsenPage(cur+1);pagerText.scrollTop=0;}
});
jumpBtn.addEventListener("click",()=>{
  const v=parseInt(jumpInput.value);
  if(v>=1&&v<=100)renderCevsenPage(v-1);
});
jumpInput.addEventListener("keydown",(e)=>{if(e.key==="Enter"){const v=parseInt(jumpInput.value);if(v>=1&&v<=100)renderCevsenPage(v-1);}});

toggleDesc.addEventListener("click",()=>{
  const open=descBoxEl.classList.toggle("open");
  toggleDesc.textContent=open?"Okunuş ▴":"Okunuş ▾";
});

function tap(){
  const a=getActive();
  a.today++;a.total++;
  save(state);renderCounter();renderMenu();
  ringTap.style.transform="scale(0.93)";
  setTimeout(()=>ringTap.style.transform="",100);
}
function undo(){
  const a=getActive();
  a.today=Math.max(0,a.today-1);
  a.total=Math.max(0,a.total-1);
  save(state);renderCounter();renderMenu();
}
function resetToday(){
  const a=getActive();
  if(!confirm("Bugünkü sayım sıfırlansın mı?"))return;
  a.today=0;save(state);renderCounter();renderMenu();
}
function resetAllData(){
  if(!confirm("Tüm veriler silinsin mi?"))return;
  localStorage.removeItem(KEY);
  state=structuredClone(DEFAULT_STATE);
  save(state);renderMenu();switchToMenu();
}

ringTap.addEventListener("click",tap);
ringTap.addEventListener("keydown",(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();tap();}});
undoBtn.addEventListener("click",undo);
resetBtn.addEventListener("click",resetToday);
backBtn.addEventListener("click",()=>{switchToMenu();renderMenu();});
resetDataBtn.addEventListener("click",resetAllData);

save(state);renderMenu();switchToMenu();
</script>
</body>
</html>
